template-columns:minmax(0,1.1fr) minmax(320px,.62fr);gap:56px;align-items:end}.eyebrow{margin:0 0 16px;color:var(--accent);font-size:13px;font-weight:700;line-height:1.2;letter-spacing:.08em;text-transform:uppercase}h1,h2,h3,p{margin-top:0}h1,h2,h3{font-family:"Space Grotesk",Inter,sans-serif;letter-spacing:0}h1{max-width:860px;margin-bottom:22px;font-size:64px;font-weight:700;line-height:1.05}h2{margin-bottom:16px;font-size:40px;font-weight:600;line-height:1.15}h3{margin-bottom:12px;font-size:24px;font-weight:600;line-height:1.2}.lead{max-width:760px;color:var(--secondary);font-size:19px}.actions,.filters,.tags{display:flex;flex-wrap:wrap;gap:12px}.actions{margin-top:34px}.btn,.filter{display:inline-flex;min-height:46px;align-items:center;justify-content:center;border-radius:8px;padding:0 18px;font-size:15px;font-weight:500;line-height:1.2;letter-spacing:.01em;transition:.2s ease}.primary{border:1px solid var(--accent);background:var(--accent);color:#04111c;box-shadow:var(--glow)}.primary:hover{background:var(--hover);border-color:var(--hover);transform:translateY(-1px)}.secondary,.filter{border:1px solid var(--border);background:rgba(23,32,51,.76);color:var(--text)}.secondary:hover,.filter:hover,.filter.on{border-color:var(--accent);color:var(--hover)}.panel,.card{border:1px solid var(--border);border-radius:8px;background:rgba(23,32,51,.86);padding:28px;transition:.2s ease}.card:hover{border-color:rgba(34,211,238,.42);transform:translateY(-2px)}.panel dl{display:grid;gap:18px;margin:0}.panel dt,.meta{color:var(--muted);font-size:13px;font-weight:700;text-transform:uppercase}.panel dd{margin:4px 0 0;font-weight:600}.head{max-width:760px;margin-bottom:40px}.head p,.card p,.profile-copy,.detail-lead{color:var(--secondary)}.profile{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:24px}.grid{display:grid;gap:24px}.skills{grid-template-columns:repeat(4,1fr)}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}.contact-grid{grid-template-columns:minmax(0,1fr) minmax(320px,.7fr)}ul{margin:14px 0 18px;padding:0;list-style:none}.list li{position:relative;margin:8px 0;padding-left:16px;color:var(--secondary);font-size:15px;line-height:1.55}.list li:before{content:"";position:absolute;top:.72em;left:0;width:5px;height:5px;border-radius:50%;background:var(--accent)}.tags{margin:0;padding:0}.tags li,.pill{display:inline-flex;width:fit-content;border:1px solid rgba(34,211,238,.34);border-radius:999px;color:var(--hover);padding:6px 10px;font-size:13px;font-weight:600;line-height:1.2}.filters{margin-bottom:24px}.hidden{display:none}.edu-item{border-left:1px solid var(--border);padding-left:16px}.links{display:grid;gap:10px;font-style:normal}.links a,.links span{display:block;border-bottom:1px solid var(--border);color:var(--secondary);padding:10px 0}.footer{border-top:1px solid var(--border);padding:32px 0;color:var(--muted);font-size:15px}.footer-grid{display:flex;justify-content:space-between;gap:24px}.footer strong{color:var(--text)}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.gallery div{display:grid;min-height:150px;place-items:center;border:1px dashed rgba(167,176,192,.34);border-radius:8px;background:rgba(17,24,39,.54);color:var(--muted);font-size:15px}@media(max-width:1040px){.skills,.three{grid-template-columns:repeat(2,1fr)}.hero-grid,.profile,.contact-grid{grid-template-columns:1fr}}@media(max-width:820px){:root{--head:66px}.container{width:min(100% - 40px,var(--max))}.section,.detail{padding:72px 0}.hero{min-height:auto;padding:72px 0 56px}h1{font-size:48px}h2{font-size:34px}.menu{display:block}.nav{position:fixed;inset:var(--head) 0 auto 0;display:none;max-height:calc(100vh - var(--head));overflow:auto;border-bottom:1px solid var(--border);background:rgba(11,18,32,.98);padding:20px}.nav.open{display:grid}.nav a,.lang a{min-height:42px;display:flex;align-items:center}.lang{margin:0;padding:12px 0 0;border-left:0;border-top:1px solid var(--border)}.two,.gallery{grid- 'Profil',title:"Profil technique oriente vers un travail d'ingenierie precis et verifiable.",text:["Lev Levinov construit un parcours professionnel autour de l'electronique, des systemes embarques, de la CAO, du prototypage et de la fabrication numerique.","Ce portfolio est structure pour documenter l'experience verifiee, les projets techniques, la formation et les futures certifications sans ajouter d'informations non confirmees.","L'orientation technique est pratique : comprendre les contraintes, concevoir des solutions propres, prototyper avec rigueur et documenter les resultats."],q:['Autonome','Rigoureux','Oriente solution']},current:{ey:'Situation actuelle',title:'Orientation technique actuelle',status:'Statut actuel de formation ou de travail : A completer.',areas:['Electronique','Systemes embarques','Prototypage','CAO','Fabrication numerique']},skills:[['Electronique & Systemes embarques',['Analyse de circuits','Capteurs et actionneurs','Microcontroleurs','Bases du signal','Tests et diagnostic']],['CAO & Conception mecanique',['Modelisation parametrique','Assemblages mecaniques','Plans techniques','Conception pour fabrication','Notions de tolerances']],['Fabrication numerique : impression 3D & CNC',['Impression 3D FDM','Principes du fraisage CNC','Contraintes materiaux','Iteration de prototypes','Preparation atelier']],['Programmation & Outils techniques',['Documentation technique structuree','Bases du versioning','Automatisation','Fiches techniques','Methodes de debogage']]],exp:[{slug:'technical-experience-placeholder',title:'Experience technique',company:'Entreprise ou contexte : A completer',period:'Periode : A completer',loc:'Localisation : A completer',sum:'Entree provisoire pour une experience professionnelle verifiee. Remplacer par un poste, une entreprise ou un contexte projet confirme.',resp:['A completer','A completer','A completer'],skills:['Documentation technique','Resolution de problemes',"Workflow d'ingenierie"],extra:{ctx:'Entreprise, equipe, perimetre projet et contexte operationnel : A completer.',tasks:['A completer','A completer','A completer'],impact:['A completer','A completer']}}],filters:[['all','Tous'],['electronics','Electronique'],['drones','Drones'],['cad','CAO'],['cnc','Fraisage CNC'],['3d-printing','Impression 3D'],['personal-rd','R&D personnelle']],projects:[{slug:'embedded-electronics-prototype',title:'Prototype electronique embarque',cat:'Electronique',filter:'electronics',sum:'Projet provisoire pour un prototype electronique ou embarque. Remplacer par le perimetre verifie, les composants, les contraintes et les resultats de test.',tools:['Microcontroleur','Capteurs','Equipement de test','Documentation technique'],status:'A completer',sub:'Prototype electronique et systemes embarques',extra:{ctx:'A completer.',obj:'A completer.',approach:'A completer.',result:'A completer.',skills:['Electronique','Systemes embarques','Diagnostic','Documentation']}},{slug:'cad-digital-fabrication-study',title:'Etude CAO et fabrication numerique',cat:'CAO',filter:'cad',sum:'Projet provisoire pour une conception mecanique, une impression 3D ou un workflow CNC. Remplacer par les modeles, materiaux, tolerances et sorties de fabrication.',tools:['CAO','Impression 3D','Workflow CNC','Mesure'],status:'A completer',sub:'Conception mecanique et workflow de fabrication',extra:{ctx:'A completer.',obj:'A completer.',approach:'A completer.',result:'A completer.',skills:['CAO','Conception pour fabrication','Iteration prototype','Documentation technique']}}],edu:[['Diplomes'],['Cours'],['Certifications']],contact:{title:'Disponible pour des projets techniques, stages, collaborations ou opportunites professionnelles.',loc:'France - Bordeaux / Ardeche',email:'A completer',phone:'A completer',linkedin:'A completer',github:'https://github.com/levlevinov'},foot:'Electronique, systemes embarques, CAO et fabrication numerique'}};
const app=document.getElementById('app'),nav=document.getElementById('nav'),brand=document.getElementById('brand'),menu=document.getElementById('menu');
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const ul=a=>`<ul class="list">${a.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`, tags=a=>`<ul class="tags">${a.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;
function route(){let m=location.pathname.match(/^\/(fr|en)(?:\/(projects|experience)\/([^/]+))?\/?$/);return m?{lang:m[1],type:m[2]||'home',slug:m[3]}:{lang:'en',type:'home'}}
function setMeta(c){document.title=c.meta[0];document.getElementById('meta-description').content=c.meta[1]}
function renderNav(lang,r){let c=D[lang],ids=['profile','experience','skills','projects','education','contact'];brand.href=`/${lang}/`;nav.innerHTML=ids.map((id,i)=>`<a href="/${lang}/#${id}">${c.nav[i]}</a>`).join('')+`<span class="lang"><a class="${lang==='fr'?'on':''}" href="/fr/${r.type!=='home'?r.type+'/'+r.slug:''}">FR</a><span>/</span><a class="${lang==='en'?'on':''}" href="/en/${r.type!=='home'?r.type+'/'+r.slug:''}">EN</a></span>`}
function home(lang){let c=D[lang];setMeta(c);app.innerHTML=`<section class="hero"><div class="container hero-grid"><div><p class="eyebrow">${c.profile.ey}</p><h1>Lev Levinov</h1><p class="lead">${c.hero.sub}</p><p class="lead">${c.hero.pos}</p><div class="actions"><a class="btn primary" href="#projects">${c.t.view}</a><a class="btn secondary" href="#contact">${c.t.contact}</a><a class="btn secondary" href="#">${c.t.cv}</a></div></div><aside class="panel"><dl><div><dt>Location</dt><dd>${c.hero.loc}</dd></div><div><dt>${c.t.current}</dt><dd>${c.current.status}</dd></div><div><dt>Availability</dt><dd>${c.hero.avail}</dd></div></dl></aside></div></section><section class="section" id="profile"><div class="container profile"><div><p class="eyebrow">${c.profile.ey}</p><h2>${c.profile.title}</h2><div class="profile-copy">${c.profile.text.map(p=>`<p>${p}</p>`).join('')}</div></div><div class="card"><h3>${c.nav[0]}</h3>${tags(c.profile.q)}</div></div></section><section class="section"><div class="container grid two"><div class="head"><p class="eyebrow">${c.current.ey}</p><h2>${c.current.title}</h2><p>${c.current.status}</p></div><div class="card">${tags(c.current.areas)}</div></div></section><section class="section" id="skills"><div class="container"><div class="head"><p class="eyebrow">${c.nav[2]}</p><h2>${lang==='fr'?'Competences organisees par domaine technique.':'Competencies organized by technical domain.'}</h2></div><div class="grid skills">${c.skills.map(s=>`<article class="card"><h3>${s[0]}</h3>${ul(s[1])}</article>`).join('')}</div></div></section>${experience(c,lang)}${projects(c,lang)}${education(c)}${contact(c)}${footer(c,lang)}`;filters()}
function experience(c,lang){return `<section class="section" id="experience"><div class="container"><div class="head"><p class="eyebrow">${c.nav[1]}</p><h2>${lang==='fr'?'Experience professionnelle':'Professional experience'}</h2></div><div class="grid two">${c.exp.map(e=>`<article class="card" id="experience-${e.slug}"><h3>${e.title}</h3><p>${e.company}<br>${e.period}<br>${e.loc}</p><p>${e.sum}</p><p class="meta">${c.t.resp}</p>${ul(e.resp)}<p class="meta">${c.t.used}</p>${tags(e.skills)}<a class="btn secondary" target="_blank" rel="noopener noreferrer" href="/${lang}/experience/${e.slug}">${c.t.details}</a></article>`).join('')}</div></div></section>`}
function projects(c,lang){return `<section class="section" id="projects"><div class="container"><div class="head"><p class="eyebrow">${c.nav[3]}</p><h2>${lang==='fr'?"Projets techniques et cas d'etude":'Technical projects and case studies'}</h2></div><div class="filters">${c.filters.map((f,i)=>`<button class="filter ${i?'':'on'}" data-filter="${f[0]}">${f[1]}</button>`).join('')}</div><div class="grid two">${c.projects.map(p=>`<article class="card project" data-cat="${p.filter}" id="project-${p.slug}"><span class="pill">${p.cat}</span><h3>${p.title}</h3><p>${p.sum}</p><p class="meta">${c.t.tools}</p>${tags(p.tools)}<p class="meta">${c.t.status}</p><p><span class="pill">${p.status}</span></p><a class="btn secondary" target="_blank" rel="noopener noreferrer" href="/${lang}/projects/${p.slug}">${c.t.more}</a></article>`).join('')}</div></div></section>`}
function education(c){return `<section class="section" id="education"><div class="container"><div class="head"><p class="eyebrow">${c.nav[4]}</p><h2>${c.nav[4]}</h2></div><div class="grid three">${c.edu.map(g=>`<article class="card"><h3>${g[0]}</h3><div class="edu-item"><p><strong>${c.t.todo}</strong></p><p>${c.t.todo}</p><p>${c.t.todo}</p></div></article>`).join('')}</div></div></section>`}
function contact(c){return `<section class="section" id="contact"><div class="container contact-grid grid"><div><p class="eyebrow">${c.nav[5]}</p><h2>${c.contact.title}</h2></div><address class="card links"><span><span class="meta">Location</span>${c.contact.loc}</span><span><span class="meta">Email</span>${c.contact.email}</span><span><span class="meta">Phone</span>${c.contact.phone}</span><span><span class="meta">LinkedIn</span>${c.contact.linkedin}</span><a href="${c.contact.github}" target="_blank" rel="noopener noreferrer"><span class="meta">GitHub</span>${c.contact.github}</a></address></div></section>`}
function footer(c,lang){return `<footer class="footer"><div class="container footer-grid"><div><strong>Lev Levinov</strong><div>${c.foot}</div><div>Copyright 2026 Lev Levinov</div></div><div class="lang"><a href="/fr/" class="${lang==='fr'?'on':''}">FR</a><a href="/en/" class="${lang==='en'?'on':''}">EN</a></div></div></footer>`}
function details(lang,type,slug){let c=D[lang],arr=type==='projects'?c.projects:c.exp,item=arr.find(x=>x.slug===slug);if(!item)return home(lang);setMeta(c);let blocks=type==='projects'?[ [c.t.ctx,item.extra.ctx],[c.t.obj,item.extra.obj],[c.t.approach,item.extra.approach],[c.t.tools,item.tools],[c.t.result,item.extra.result],[c.t.shown,item.extra.skills] ]:[[c.t.ctxco,item.extra.ctx],[c.t.resp,item.resp],[c.t.tasks,item.extra.tasks],[c.t.impact,item.extra.impact],[c.t.shown,item.skills]];app.innerHTML=`<article class="detail"><div class="container"><header class="head"><p class="eyebrow">${type==='projects'?item.cat:c.nav[1]}</p><h1>${item.title}</h1><p class="detail-lead">${item.sub||item.sum}</p></header><div class="grid two">${blocks.map(b=>`<section class="card"><h3>${b[0]}</h3>${Array.isArray(b[1])?ul(b[1]):`<p>${b[1]}</p>`}</section>`).join('')}</div>${type==='projects'?`<section class="section"><h2>${c.t.gallery}</h2><div class="gallery"><div>${c.t.todo}</div><div>${c.t.todo}</div><div>${c.t.todo}</div></div></section>`:''}<a class="btn secondary" href="/${lang}/#${type==='projects'?'project':'experience'}-${item.slug}">${type==='projects'?c.t.backp:c.t.backe}</a></div></article>${footer(c,lang)}`}
function filters(){document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('on',x===b));document.querySelectorAll('.project').forEach(p=>p.classList.toggle('hidden',b.dataset.filter!=='all'&&p.dataset.cat!==b.dataset.filter))})}
menu.onclick=()=>{let open=nav.classList.toggle('open');menu.setAttribute('aria-expanded',String(open))};
let r=route();renderNav(r.lang,r);r.type==='home'?home(r.lang):details(r.lang,r.type,r.slug);
</script>
</body>
</html>
