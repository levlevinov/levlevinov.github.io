<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пробная главная страница</title>

    <style>
        /* =====================================================
           БЛОК 0 — НАСТРОЙКИ ФОНА СТРАНИЦЫ
           ===================================================== */

        /*
           Здесь задаются все цвета фона страницы.
           Можно использовать:
           - один цвет (оставить только --bg-color-1)
           - градиент из нескольких цветов
           Всего предусмотрено до 8 цветов.
        */
        :root {
            --bg-color-1: #ffffff; /* основной белый цвет */
            --bg-color-2: #ffffff;
            --bg-color-3: #e8e8e8;
            --bg-color-4: #dddddd;
            --bg-color-5: #cccccc;
            --bg-color-6: #bbbbbb;
            --bg-color-7: #aaaaaa;
            --bg-color-8: #999999;
        }

        /*
           Стили для всего документа
        */
        body {
            margin: 0; /* убираем стандартные отступы браузера */
            padding: 0;

            /* 
               ФОН СТРАНИЦЫ
               По умолчанию — градиент.
               Если нужен чисто белый фон:
               закомментируй background: linear-gradient(...)
               и оставь background-color
            */
            background-color: var(--bg-color-1);

            background: linear-gradient(
                180deg,
                var(--bg-color-1) 0%,
                var(--bg-color-2) 25%,
                var(--bg-color-3) 50%,
                var(--bg-color-4) 100%
            );

            min-height: 100vh; /* высота страницы = высота экрана */
            font-family: Arial, sans-serif;
        }

        /* =====================================================
           БЛОК 1 — ОСНОВНОЙ БЛОК С ИНФОРМАЦИЕЙ О СЕБЕ
           ===================================================== */

        /*
           Блок_1_Основная_информация
           Можно:
           - менять размеры
           - менять положение
           - полностью удалить без поломки страницы
        */
        .block-main-info {

            /* ---------- РАЗМЕРЫ БЛОКА ---------- */

            width: 30cm;  /* фиксированная ширина блока (константа) */
            height: 5cm;  /* фиксированная высота блока (константа) */

            /* ---------- ПОЗИЦИОНИРОВАНИЕ ---------- */

            position: absolute;

            /*
               Отступ от верхней части страницы
               (примерно от поисковой строки браузера)
            */
            top: 2.5cm;

            /*
               Центрирование блока по горизонтали
            */
            left: 50%;
            transform: translateX(-50%);

            /* ---------- ВНЕШНИЙ ВИД ---------- */

            background-color: #ffffff; /* цвет самого блока */
            border-radius: 30px;        /* скругление углов */

            /*
               Лёгкий 3D-эффект:
               можно убрать, закомментировав box-shadow
            */
            box-shadow:
                0 8px 20px rgba(0, 0, 0, 0.12),
                0 2px 6px rgba(0, 0, 0, 0.08);

            /* ---------- ВНУТРЕННИЕ ОТСТУПЫ ---------- */

            padding: 20px;

            /* ---------- ВРЕМЕННЫЙ КОНТЕНТ ---------- */

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /*
           Текст внутри основного блока
           Временный, для визуального контроля
        */
        .block-main-info p {
            margin: 0;
            color: #333333;
            font-size: 16px;
        }

    </style>
</head>

<body>

    <!-- =====================================================
         HTML-БЛОК 1 — ОСНОВНАЯ ИНФОРМАЦИЯ
         ===================================================== -->

    <div class="block-main-info">
        <p>
            Блок_1_Основная_информация<br>
            (временный текст)
        </p>
    </div>

</body>
</html>
